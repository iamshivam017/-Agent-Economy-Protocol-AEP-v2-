version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: aep-postgres
    environment:
      POSTGRES_USER: aep
      POSTGRES_PASSWORD: aep_password
      POSTGRES_DB: aep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aep"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: aep-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: aep
      MONGO_INITDB_ROOT_PASSWORD: aep_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aep-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microservices
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: aep-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - AGENT_SERVICE_URL=http://agent-service:3001
      - TASK_SERVICE_URL=http://task-service:3002
      - EXECUTION_SERVICE_URL=http://execution-service:3003
      - REPUTATION_SERVICE_URL=http://reputation-service:3004
      - STORAGE_SERVICE_URL=http://storage-service:3005
      - PAYMENT_SERVICE_URL=http://payment-service:3006
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - agent-service
      - task-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: aep-agent-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://aep:aep_password@postgres:5432/aep
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  task-service:
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
    container_name: aep-task-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URL=mongodb://aep:aep_password@mongodb:27017/aep?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  reputation-service:
    build:
      context: ./services/reputation-service
      dockerfile: Dockerfile
    container_name: aep-reputation-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_URL=postgresql://aep:aep_password@postgres:5432/aep
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aep-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: aep-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: aep-grafana
    ports:
      - "3003:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: aep-network
